<h1 id="score">0</h1>


<button onclick="add()">+1 
padding: 20px; 
font-size: 20px; </button>

<style>
  
  body {
    background-color: blue;
     text-align: center
  }

</style>

<script>
let score = 0;

document.getElementById("score").innerText = score;

function add() {
  score++;
  document.getElementById("score").innerText = score;
}
</script>
