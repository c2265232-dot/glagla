<button onclick="add()">+1</button>


<h1 id="score">0</h1>

<style>
  body {
    background-color: blue;
  }
  text-align: center
</style>

<script>
let score = 0;

document.getElementById("score").innerText = score;

function add() {
  score++;
  document.getElementById("score").innerText = score;
}
</script>
